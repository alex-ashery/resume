work:
  - name: Block, Inc.
    position: Senior Software Engineer, Platform Observability
    url: https://block.xyz/
    startDate: 2022-03-21
    endDate: 2026-02-26
    summary: Worked on the Platform Observability team to improve the reliability, scalability, and operability of Block’s telemetry systems. Contributed to major migrations and day-to-day platform administration across metrics, logs, and monitoring, while coordinating across developers, platform teams, security, and vendors to improve incident response, cost/reliability outcomes, and internal developer experience.
    highlights:
      - Served as a key contributor to Block’s SignalFx-to-Datadog migration by co-authoring migration guidance, providing hands-on developer support and troubleshooting, improving the GitOps monitor provisioning workflow from user feedback, coordinating migration contractors, and partnering with platform teams to establish reusable monitor templates and ownership expectations.
      - Served as a Datadog admin and technical expert by defining PII-leak and log-rehydration policies, coordinating incidents when leaks occurred, guiding users toward effective and budget-conscious rehydration scopes, approving and provisioning sensitive resources (RBAC, API keys, RUM apps), and helping developers troubleshoot Datadog usage and pipeline integration issues. Acted as a cross-functional connector between leadership, platform teams, product developers, and Datadog stakeholders (TAM, account, product), translating needs across groups and providing product performance, cost, and reliability feedback that informed contract negotiations and platform direction.
      - Owned Cash App log pipeline administration (Fluentd/Vector), including rate-limiting strategy, deployment modernization (Helm/Argo CD), multiline log integrity fixes, and new DNS access-log ingestion to S3 for Security analytics.
      - Drove Cash App’s multi-quarter migration from Fluentd to Vector after validating, through stress testing and PoC benchmarking, that Fluentd could not meet projected cloud-monolith log volume while Vector could. Authored the decision doc that secured leadership buy-in, onboarded and guided engineers across schema validation/monitoring/rule translation workstreams, built and deployed Terraform-managed pipeline infrastructure (secrets, IAM, Argo apps) across accounts and EKS clusters, coordinated staged parallel rollout and capacity planning with SRE/Compute/Cloud Economics, and executed cutover and deprecation with zero log loss, duplication, or downtime.
      - Administered Cash App’s metrics pipeline by bootstrapping datadog-agent Argo applications and Terraform infrastructure, identifying and remediating metric loss caused by scrape-limit constraints at scale, enabling non-standard partner integrations (including pre-GA Temporal Cloud and dedicated PlanetScale clusters), and building Helm/Argo-based deployment for a GPU metrics exporter to ingest ML cluster telemetry into Datadog.
      - Monitor provisioning pipeline (priority notifications migration)
      - Monitor provisioning pipeline migration
      - Platform observability unification, infra and multi-cluster
      - Improved Square log pipeline resilience by implementing graceful degradation for Elasticsearch outages (dead-letter queues, replay consumers, and ILM safeguards for safe reindexing) and serving as Observability point of contact during a cross-region disaster-recovery exercise, where I identified west-2 dependency as a single point of failure, defined short-term mitigation to preserve service observability during partition scenarios, and guided implementation of a partition-resilient per-region pipeline design for archival storage, indexing queues, and consumers.
      - Enabled AI platform observability and access at scale by building an Envoy-based Datadog API proxy for Block’s internal MCP server (network-accessible, credential-injected, RBAC-constrained read-only access), advising Goose engineers on OTEL metric emission and a Vector-based gateway for laptop-to-Datadog ingestion, and bootstrapping logs/metrics pipelines plus app-level Datadog observability in a dedicated EKS cluster for cloud-hosted LLM agents.
      - Served in support and on-call rotations for observability, assisting developers with telemetry pipelines, Datadog, and monitor provisioning, and escalating issues into bugs, feature work, or incidents when appropriate. Established outage runbooks and shared on-call practices (SLA, rotation, handoff), led incident response and postmortems with cross- functional stakeholders, and introduced a weekly support-review/root-cause process that reduced queue load and moved observability support from the busiest platform queue to fourth.
      - Conducted programming and system design interviews for engineering candidates across Block.
  - name: Zillow Group, LLC
    position: Software Development Engineer, Data Infrastructure
    url: https://www.zillow.com/
    startDate: 2020-11-09
    endDate: 2022-01-25
    summary: Built and operated Zillow’s data infrastructure. Implemented automation to improve the scalability and performance of critical data platform operations for internal analytics teams.
    highlights:
      - Assisted migration from Presto on Qubole to Trino on Starburst. Maintained Qubole service prior to migration. Documentated and communicated migration status and user action items. Bootstrapped new Trino clusters on k8s and documented process. Conducted tests. Collaborated with Starburst support on resolving pain points.
      - Wrote k8s ExternalSecrets manifests for Trino. Encoded secrets and datalake access policies in Terraform.
      - Developed a Java tool for replaying Presto/Trino queries which mimics production traffic patterns. Used tool to evaluate the system’s performance and functional capabilities for version upgrades and feature comparisons. Educated and guided BI Platform team members with using the query replay tool for conducting migration tests.
      - Provided on-call support for Mode, Tableau, and Presto/Trino for data scientists and business analysts.
      - Directed India team members in providing CI/CD tooling for automated deployment to our Presto clusters.
      - Implemented RubiX caching - an async read-through cache for Trino's hive connector - to improve cluster scalability. Conducted performance evaluations, concluding a 7% decrease in total query wall time.
      - Automated processes for batch platform team. Developed Airflow DAG for attributing datalake usage to teams at Zillow. Wrote Spark script to generate object manifests for Glacier restore operations. Restored user data.
  - name: Microsoft Corporation
    position: Software Development Engineer I, Azure App Service on Linux
    url: https://azure.microsoft.com/en-us/pricing/details/app-service/linux/
    startDate: 2018-12-01
    endDate: 2020-10-01
    summary: Worked on platform observability for Azure App Service on Linux, contributing telemetry and monitoring features for both internal operations and customer diagnostics. Developed runtime capabilities that improved app configuration flexibility and storage integration for Linux workloads.
    highlights:
      - Upgraded and was responsible for platform telemetry services. Migrated platform to use Fluent Bit for log forwarding, which dramatically improved telemetry reliability and performance.
      - Implemented Linux Platform logs, which provides customers with improved insights into problems impacting app management.
      - Enabled monitoring of custom images for App Service Linux customers via Azure App Insights.
      - Collaborated on developing the bring-your-own-storage feature, which allows customers to mount Azure Storage solutions to their Linux web apps. Enabled feature configuration via ARM templates. Conducted performance tests to provide customer guidance on setting storage quotas for anticipated workloads.
      - Enabled configuring custom docker images via digests, which provides customers fine-grain control of which image their app uses.
      - Triaged customer incidents during on-call rotations.
  - name: Microsoft Corporation
    position: Software Development Engineer I, Azure Data Lake Storage
    url: https://azure.microsoft.com/en-us/products/storage/data-lake-storage
    startDate: 2016-09-06
    endDate: 2018-12-01
    summary: Developed a microservice for Azure Data Lake Storage that implemented byte-level updatability in a distributed filesystem, enabling arbitrary file writes instead of append-only workflows. Contributed to core service components such as load balancing and connection management, as well as supporting infrastructure such as performance testing and scenario testing.
    highlights:
      - Formulated and implemented a performance test capable of stressing updatability service’s transactional API, which identified performance and functional bugs, and established service performance metrics.
      - Created a method for reliably maintaining multiple Bond RPC connections in the updatability service.
      - Built a scenario testing platform for updatability service and integrated platform with VSTS for gated check-ins, improving service reliability and lowering test development time.
      - Created an updatability service frontend for load-balancing. Updated the service RPC schema and communication mechanisms to use simplified, command-agnostic requests, reducing frontend serialization overhead.
      - Wrote modules that handle leader election for dynamic load-balancing in naming service.
      - Upgraded updatability service to communicate using a secure transport protocol, enabling security compliance.
      - Bootstrapped, maintained, deployed to, and regulated testing on an Autopilot cluster reserved for testing of the updatability microservice, enabling the team to evaluate the service’s distributed capabilities.
      - Triaged Cosmos and ADLS customer incidents in on-call rotation.
      - Bootstrapped a new Cosmos cluster, enabling expanded service availability.
      - Upgraded the updatability build system to MSBuild, dramatically reducing development time overhead.
      - Wrote documentation on and assisted teammates in making internal ADLS accounts.
