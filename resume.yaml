work:
  - name: Block, Inc.
    position: Senior Software Engineer, Platform Observability
    url: https://block.xyz/
    startDate: 2022-03-21
    endDate: 2026-02-26
    summary: Worked on the Platform Observability team to improve the reliability, scalability, and operability of Block’s telemetry systems. Contributed to major migrations and day-to-day platform administration across metrics, logs, and monitoring. Coordinating across developers, platform teams, security, and vendors to improve incident response, cost/reliability outcomes, and internal developer experience.
    highlights:
      - Enabled AI platform observability and access at scale. Built an Envoy-based Datadog API proxy for Block’s internal MCP server (network-accessible, credential-injected, RBAC-constrained read-only access). Advised internal LLM engineers on OTEL metric emission and a Vector-based gateway for laptop-to-Datadog ingestion. Bootstrapped telemetry pipelines and app-level Datadog observability in a dedicated EKS cluster for cloud-hosted LLM agents.
      - Served as a Datadog admin and technical expert. Acted as a cross-functional connector between leadership, platform teams, product developers, and Datadog stakeholders (TAM, account, product). Translated needs across groups and provided product performance, cost, and reliability feedback that informed contract negotiations and platform direction. Defined PII-leak policies and coordinated leak incidents. Defined log-rehydration policies and guided users toward effective and budget-conscious rehydration scopes. Approved and provisioned sensitive resources (RBAC, API keys, RUM apps), and helped developers troubleshoot Datadog usage and pipeline integration issues. 
      - Led platform observability unification across deployment infrastructure. Advocated for adoption of the Compute team's platform service provisioner and migrated Cash App telemetry pipelines to prove the path, with zero downtime. Served as DRI for migration of telemetry services across business units, with multi-quarter planning, blocker remediation, and progress reporting. Guided Square migrations for telemetry pipelines using Helm, Kustomize, and Argo CD, and resolved key blockers including Argo SSO/RBAC access and a YAML rendering bug that I fixed in a forked external binary. Delivered telemetry pipeline rollout to 10+ new EKS clusters as an unplanned, deadline-driven initiative, rapidly absorbing a newly introduced platform goal and executing on schedule. Established a repeatable multi-cluster rollout process. Made multi-cluster telemetry pipeline deployment scalable by setting up a Kargo project for automated promotions. Onboarded around ten engineers on Helm, Kubernetes, Argo CD, Kargo, and GitOps practices over my tenure.
      - Led monitor provisioning migration strategy through shifting org direction and leadership changes. Took over the migration effort, ran a proof of concept, guided tooling development, and wrote a decision document for leadership review. Authored a vision proposal for “default monitoring,” where infrastructure provisioning systems also provisioned baseline monitoring, so new infrastructure did not launch unmonitored. Socialized my proposal across engineering leadership, product, SRE, and Cloud CD partners, which was adopted into platform direction. Partnered with the DRI of a new company-wide infrastructure pipeline to implement my vision, validated feasibility through PoCs, and designed abstractions that preserved Cash App’s existing monitoring schema for a seamless migration path. Onboarded the next migration DRI and published clarifying design guidance on default monitoring requirements that was approved and used as a prerequisite for alignment with new leadership.
      - Improved Square log pipeline resilience. Implemented graceful degradation for Elasticsearch outages using dead-letter queues, replay consumers, and ILM safeguards for safe reindexing. Served as Observability point of contact during a cross-region disaster-recovery exercise where we identified west-2 dependency as a single point of failure. Defined short-term mitigation for the exercise to preserve service observability, and guided implementation of a partition-resilient per-region pipeline design for archival storage, indexing queues, and consumers.
      - Drove Cash App’s multi-quarter migration from Fluentd to Vector. Validated through stress testing and PoC benchmarking that Fluentd could not meet projected cloud-monolith log volume while Vector could. Authored the decision doc that secured leadership buy-in. Onboarded and guided engineers across schema validation, monitoring, and rule translation workstreams. Built and deployed Terraform-managed pipeline infrastructure (secrets, IAM, Argo apps) across accounts and EKS clusters. Coordinated staged parallel rollout and capacity planning with SRE/Compute/Cloud Economics. Executed cutover and deprecation with zero log loss, duplication, or downtime.
      - Served as a key contributor to Block’s SignalFx-to-Datadog migration. Co-authored migration guidance. Provided hands-on developer support and troubleshooting. Improved the GitOps monitor provisioning workflow from user feedback. Coordinated migration contractors. Partnered with platform teams to establish reusable monitor templates and ownership expectations.
      - Administered Cash App’s log pipeline. Led rate-limiting strategy and operations by implementing exceptions, owner-visible metrics/monitors, and transition from service-level to host-level limiting. Modernized deployment of rate-limiting infrastructure from imperative kubectl workflows to Helm/Argo CD. Debugged and resolved containerd multiline log fragmentation. Enabled node-local DNS access log delivery through Vector to an S3 dataset used by security analytics team.
      - Administered Cash App’s metrics pipeline. Bootstrapped datadog-agent Argo applications and Terraform infrastructure. Identified and remediated metric loss caused by scrape-limit constraints at scale. Enabled non-standard partner integrations including pre-GA Temporal Cloud metrics and PlanetScale BYOC metrics. Built Helm/Argo-based deployment for a GPU metrics exporter to ingest ML cluster telemetry into Datadog.
      - Supported and improved Cash App’s monitor provisioning pipeline. Helped teams migrate monitor definitions from the SignalFx monorepo to the new GitHub/Buildkite-based workflow. Defined monitor templates and helped partner platform teams implement their own templates. Updated the pipeline JSON schema for template validation and added schema support for additional Datadog monitor features. Fixed a bug in the git-diff trigger logic used to decide when provisioning jobs should run. Paired with a teammate on a large-scale change to update the pipeline’s user notification system. Triaged support-channel issues, implemented relevant fixes and feature requests, and expanded usage and troubleshooting documentation. Advised SRE team on developing tooling that notified users when monitor templates required updates.
      - Served in support and on-call rotations for observability. Assisting developers with telemetry pipelines, Datadog, and monitor provisioning. Escalated issues into bugs, feature work, or incidents when appropriate. Established outage runbooks and shared on-call practices (SLA, rotation, handoff). Led incident response and postmortems with cross-functional stakeholders. Introduced a weekly support-review/root-cause process for the observability team that reduced queue load and moved observability support from the busiest platform queue to fourth.
      - Conducted programming and system design interviews for engineering candidates across Block.
  - name: Zillow Group, LLC
    position: Software Development Engineer, Data Infrastructure
    url: https://www.zillow.com/
    startDate: 2020-11-09
    endDate: 2022-01-25
    summary: Built and operated Zillow’s data infrastructure. Implemented automation to improve the scalability and performance of critical data platform operations for internal analytics teams.
    highlights:
      - Assisted migration from Presto on Qubole to Trino on Starburst. Maintained Qubole service prior to migration. Documented and communicated migration status and user action items. Bootstrapped new Trino clusters on EKS and documented process. Conducted tests. Collaborated with Starburst support on resolving pain points.
      - Wrote k8s ExternalSecrets manifests for Trino. Encoded secrets and data lake access policies in Terraform.
      - Developed a Java tool for replaying Presto/Trino queries which mimics production traffic patterns. Used tool to evaluate the system’s performance and functional capabilities for version upgrades and feature comparisons. Educated and guided BI Platform team members with using the query replay tool for conducting migration tests.
      - Provided on-call support for Mode, Tableau, and Presto/Trino for data scientists and business analysts.
      - Directed India team members in providing CI/CD tooling for automated deployment to our Presto clusters.
      - Implemented RubiX caching - an async read-through cache for Trino's hive connector - to improve cluster scalability. Conducted performance evaluations, concluding a 7% decrease in total query wall time.
      - Automated processes for batch platform team. Developed Airflow DAG for attributing data lake usage to teams at Zillow. Wrote Spark script to generate object manifests for Glacier restore operations. Restored user data.
  - name: Microsoft Corporation
    position: Software Development Engineer I, Azure App Service on Linux
    url: https://azure.microsoft.com/en-us/pricing/details/app-service/linux/
    startDate: 2018-12-01
    endDate: 2020-10-01
    summary: Worked on platform observability, contributing telemetry and monitoring features for internal operations and customer diagnostics. Developed runtime capabilities that improved app configuration flexibility and storage integration.
    highlights:
      - Upgraded and was responsible for platform telemetry services. Migrated platform to use Fluent Bit for log forwarding, which dramatically improved telemetry reliability and performance.
      - Implemented Linux Platform logs, which provides customers with improved insights into problems impacting app management.
      - Enabled monitoring of custom images for App Service Linux customers via Azure App Insights.
      - Collaborated on developing the bring-your-own-storage feature, which allows customers to mount Azure Storage solutions to their Linux web apps. Enabled feature configuration via ARM templates. Conducted performance tests to provide customer guidance on setting storage quotas for anticipated workloads.
      - Enabled configuring custom docker images via digests, which provides customers fine-grain control of which image their app uses.
      - Triaged customer incidents during on-call rotations.
  - name: Microsoft Corporation
    position: Software Development Engineer I, Azure Data Lake Storage
    url: https://azure.microsoft.com/en-us/products/storage/data-lake-storage
    startDate: 2016-09-06
    endDate: 2018-12-01
    summary: Developed a microservice for Azure Data Lake Storage that implemented byte-level updatability. Contributed to core service components including load balancing, connection management, and testing infrastructure.
    highlights:
      - Formulated and implemented a performance test capable of stressing updatability service’s transactional API, which identified performance and functional bugs, and established service performance metrics.
      - Created a method for reliably maintaining multiple Bond RPC connections in the updatability service.
      - Built a scenario testing platform for updatability service and integrated platform with VSTS for gated check-ins, improving service reliability and lowering test development time.
      - Created an updatability service frontend for load-balancing. Updated the service RPC schema and communication mechanisms to use simplified, command-agnostic requests, reducing frontend serialization overhead.
      - Wrote modules that handle leader election for dynamic load-balancing in naming service.
      - Upgraded updatability service to communicate using a secure transport protocol, enabling security compliance.
      - Bootstrapped, maintained, deployed to, and regulated testing on an Autopilot cluster reserved for testing of the updatability microservice, enabling the team to evaluate the service’s distributed capabilities.
      - Triaged Cosmos and ADLS customer incidents in on-call rotation.
      - Bootstrapped a new Cosmos cluster, enabling expanded service availability.
      - Upgraded the updatability build system to MSBuild, dramatically reducing development time overhead.
      - Wrote documentation on and assisted teammates in making internal ADLS accounts.
